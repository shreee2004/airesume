services:
  - type: web
    name: airesume-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false                # set in the Render dashboard
      - key: CORS_ORIGINS
        sync: false                # e.g. https://<your-vercel-domain>.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
